# =============================================================
# Daily FCI nowcast
#
# Runs the daily FCI-G nowcast + one-quarter-ahead FCI* forecast every
# weekday after the US market close:
#   1. get_fcig.py       pulls daily public proxies + the official
#                        monthly FCI-G into backend/pipeline/data/.
#   2. daily_backcast.py  trailing-window daily reconstruction.
#   3. nowcast_fcig.py    anchors it to the official releases.
#   4. get_spf.py         pulls the latest SPF median GDP/core-PCE forecasts.
#   5. forecast_fcistar.py  extends FCI* one quarter past the last estimate
#                           by running the Kalman filter one step with the
#                           fixed parameters + committed forecast_inputs;
#                           writes fcistar_forecast.csv.
#   6. build_fci_nowcast.py  writes the frontend contract
#                            backend/data/output/fci_nowcast.csv and
#                            adds the nowcast + forecast fields to metadata.json,
#                            anchoring the forecast-quarter gap to FCI*_forecast.
#
# The nowcast scripts (get_fcig/daily_backcast/nowcast_fcig) are ported from
# code/empirics/fcig/ and get_spf.py from code/empirics/SPF/ (FCIstar Dropbox);
# keep those in sync. forecast_fcistar.py / build_fci_nowcast.py are website-native.
#
# If any committed output changed, commit + push to main.
# That push triggers deploy.yml (via workflow_run) to redeploy the site.
# Also runnable on demand (workflow_dispatch).
# =============================================================

name: Daily FCI nowcast

on:
  schedule:
    # 22:00 UTC Mon-Fri (~5-6pm US Eastern, after the market close so the
    # day's equity/yield closes are final). Markets/FRED don't update on
    # weekends, so a 7-day cron would just recompute identical numbers.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nowcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/pipeline/requirements.txt

      - name: Run daily nowcast pipeline
        working-directory: backend/pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python get_fcig.py
          python daily_backcast.py
          python nowcast_fcig.py
          python get_spf.py
          python forecast_fcistar.py
          python build_fci_nowcast.py

      - name: Commit and push if the nowcast changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backend/data/output/fci_nowcast.csv backend/data/output/fci_components.csv backend/data/output/fcistar_forecast.csv backend/data/output/fcistar_sensitivity.json backend/data/output/metadata.json

          if git diff --cached --quiet; then
            echo "No change to the nowcast."
            exit 0
          fi

          THROUGH=$(python -c "import json; print(json.load(open('backend/data/output/metadata.json'))['nowcast_through'])")
          git commit -m "Daily FCI nowcast (through $THROUGH)"
          git push
