# =============================================================
# Monthly data update
#
# Runs the backend pipeline on the 1st of each month:
#   1. assemble_data.py  pulls FRED, FCI-G, HLW, and builds the
#                        quarterly panel.
#   2. estimate_CCS_struct.py  runs the Kalman estimation and
#                              writes backend/data/output/.
#
# If any output file changed, the workflow commits and pushes to
# main. That push then triggers deploy.yml, which redeploys the
# live site at fcistar.org.
#
# Also runnable on demand via the "Run workflow" button in the
# Actions tab (workflow_dispatch).
# =============================================================

name: Monthly data update

on:
  schedule:
    # 06:00 UTC on the 1st of every month (~1–2am US Eastern)
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/pipeline/requirements.txt

      - name: Assemble data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python backend/pipeline/assemble_data.py

      - name: Run estimation
        working-directory: backend/pipeline
        run: python estimate_CCS_struct.py

      - name: Commit and push if outputs changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backend/data/output/

          if git diff --cached --quiet; then
            echo "No changes to outputs."
            exit 0
          fi

          SAMPLE_END=$(python -c "import json; print(json.load(open('backend/data/output/metadata.json'))['sample_end'])")
          git commit -m "Monthly data update (sample end $SAMPLE_END)"
          git push
